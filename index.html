<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Gradient Background Creator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="preview-panel">
        <header>
          <h1>Background Creator</h1>
          <p>Create minimalist gradient wallpapers and export for iOS or Android.</p>
        </header>

        <div class="preview-stage">
          <div class="phone-frame">
            <div class="canvas-wrap">
              <canvas id="previewCanvas" width="1290" height="2796" aria-label="Gradient preview canvas"></canvas>
              <div class="lockscreen-ui" aria-hidden="true">
                <div class="status-row">
                  <span>vodafone UK</span>
                  <span>4G ⌁ 27%</span>
                </div>
                <div class="clock-block">
                  <p>Tue 13 Jan</p>
                  <h2>18:18</h2>
                </div>
                <div class="bottom-actions">
                  <button type="button" tabindex="-1">🔦</button>
                  <button type="button" tabindex="-1">📷</button>
                </div>
                <div class="home-bar"></div>
              </div>
              <div id="previewOverlay" class="preview-overlay hidden" aria-hidden="true">
                <div class="status-zone"></div>
                <div class="notch-mask"></div>
                <div class="safe-zone safe-zone-top"></div>
                <div class="safe-zone safe-zone-bottom"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="quick-actions">
          <button id="randomizeBtn" type="button">Randomize</button>
          <button id="swapBtn" type="button" class="secondary">Swap Colors</button>
        </div>
      </section>

      <section class="controls-panel" aria-label="Background controls">
        <div class="control-group">
          <label for="gradientType">Gradient Type</label>
          <select id="gradientType">
            <option value="linear">Linear</option>
            <option value="radial">Radial</option>
            <option value="conic">Conic</option>
          </select>
        </div>

        <div class="control-group">
          <label for="angle">Angle <span id="angleValue">135°</span></label>
          <input id="angle" type="range" min="0" max="360" value="135" />
        </div>

        <div class="control-group">
          <label>Gradient Stops</label>
          <div id="stopsContainer" class="stops-list" aria-live="polite"></div>
          <button id="addStopBtn" type="button" class="secondary">Add Stop</button>
        </div>

        <div class="control-group">
          <label for="palettePreset">Palette Preset</label>
          <select id="palettePreset">
            <option value="custom">Custom</option>
            <option value="midnight">Midnight</option>
            <option value="forest">Forest</option>
            <option value="sunset">Sunset</option>
            <option value="mono">Monochrome</option>
          </select>
        </div>

        <fieldset class="control-group export-targets" id="exportTargets">
          <legend>Export Targets</legend>
          <label class="target-option"><input type="checkbox" value="1290x2796" checked /> iOS Pro Max — 1290×2796</label>
          <label class="target-option"><input type="checkbox" value="1179x2556" /> iOS Pro — 1179×2556</label>
          <label class="target-option"><input type="checkbox" value="1440x3200" /> Android QHD+ — 1440×3200</label>
          <label class="target-option"><input type="checkbox" value="1080x2400" /> Android FHD+ — 1080×2400</label>
          <label class="target-option"><input type="checkbox" value="custom" /> Custom</label>
        </fieldset>

        <div class="control-group">
          <label for="overlayProfile">Preview Overlay</label>
          <select id="overlayProfile">
            <option value="none">None</option>
            <option value="iphone-pro-max">iPhone Pro Max</option>
            <option value="iphone-pro">iPhone Pro</option>
            <option value="android-tall">Android Tall Display</option>
          </select>
        </div>

        <div class="control-group inline-control">
          <label for="overlayToggle">Show overlay guides</label>
          <input id="overlayToggle" type="checkbox" checked />
        </div>

        <div id="customSizeControls" class="custom-size hidden" aria-live="polite">
          <div class="control-group">
            <label for="customWidth">Custom Width</label>
            <input id="customWidth" type="number" min="320" max="8000" value="1440" />
          </div>
          <div class="control-group">
            <label for="customHeight">Custom Height</label>
            <input id="customHeight" type="number" min="320" max="8000" value="3200" />
          </div>
        </div>

                <div class="control-group inline-control">
          <label for="zipToggle">Export as ZIP (optional)</label>
          <input id="zipToggle" type="checkbox" />
        </div>

        <p id="exportStatus" class="export-status" aria-live="polite"></p>

        <button id="exportBtn" class="export" type="button">Export PNG(s)</button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
